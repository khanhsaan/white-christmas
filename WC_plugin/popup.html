<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>White Christmas Viewer</title>
    <style>
      :root {
        --bg: #fafafa;
        --panel: #ffffff;
        --text: #111111;
        --muted: #7e7e7e;
        --line: #e3e3e3;
        --ink: #101010;
        --ink-soft: #242424;
        --btn: #111111;
        --btn-text: #f8f8f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 380px;
        min-height: 560px;
        background:
          linear-gradient(155deg, rgba(0, 0, 0, 0.02) 0%, transparent 36%),
          repeating-linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.02) 0,
            rgba(0, 0, 0, 0.02) 1px,
            transparent 1px,
            transparent 8px
          ),
          var(--bg);
        color: var(--text);
        font: 13px/1.55 "Syne", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .wrap {
        padding: 16px;
      }

      .topbar {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-bottom: 1px solid var(--line);
        padding-bottom: 12px;
        margin-bottom: 12px;
      }

      .brand {
        font-family: "Syne", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
      }

      .brand-sub {
        color: var(--muted);
        font-family: "DM Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.12em;
        font-size: 10px;
        text-transform: uppercase;
      }

      .sub {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 11px;
        font-family: "DM Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.04em;
      }

      .card {
        background: linear-gradient(180deg, #fff, var(--panel));
        border: 1px solid var(--line);
        border-radius: 0;
        box-shadow: 0 16px 28px rgba(17, 17, 17, 0.06);
        padding: 14px;
      }

      label {
        display: block;
        margin-bottom: 11px;
      }

      .label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-family: "DM Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
      }

      input[type="text"], textarea {
        width: 100%;
        border: 1px solid #cbcbcb;
        background: #fff;
        color: var(--ink);
        border-radius: 0;
        padding: 9px 10px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input[type="password"] {
        width: 100%;
        border: 1px solid #cbcbcb;
        background: #fff;
        color: var(--ink);
        border-radius: 0;
        padding: 9px 10px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
        border-color: #111;
        box-shadow: 0 0 0 1px #111 inset;
      }

      textarea {
        min-height: 64px;
        resize: vertical;
        font-family: "DM Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 8px 0 14px;
      }

      .row label {
        margin: 0;
        color: var(--ink-soft);
        font-size: 12px;
      }

      .hint {
        color: var(--muted);
        margin: 0;
        font-size: 11px;
        font-family: "DM Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 13px;
      }

      .actions-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      button {
        border: 1px solid var(--ink);
        border-radius: 0;
        padding: 8px 12px;
        cursor: pointer;
        font-family: "DM Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 10px;
        background: var(--btn);
        color: var(--btn-text);
        transition: transform 0.06s, opacity 0.15s;
      }

      button:hover {
        opacity: 0.88;
      }

      button:active {
        transform: translateY(1px);
      }

      #saveBtn {
        background: #fff;
        color: var(--ink);
      }

      #status {
        color: var(--ink-soft);
        font-size: 11px;
        max-width: 130px;
        text-align: right;
        font-family: "DM Mono", "SF Mono", Menlo, Monaco, Consolas, monospace;
      }

      .divider {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 11px 0 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">White Christmas</div>
        <div class="brand-sub">Viewer Plugin</div>
      </div>
      <p class="sub">Configure API access for automatic authorized decode.</p>

      <div class="card">
        <label>
          <span class="label">Backend Base URL</span>
          <input id="backendBaseUrl" type="text" placeholder="http://localhost:8000" />
        </label>

        <label>
          <span class="label">Access Token (Bearer)</span>
          <textarea id="accessToken" placeholder="Paste your Supabase access token"></textarea>
        </label>

        <hr class="divider" />

        <label>
          <span class="label">Email</span>
          <input id="email" type="text" placeholder="you@example.com" />
        </label>

        <label>
          <span class="label">Password</span>
          <input id="password" type="password" placeholder="Your password" />
        </label>

        <div class="row">
          <input id="autoDecode" type="checkbox" />
          <label for="autoDecode">Enable auto decode</label>
        </div>

        <p class="hint">Use a logged-in user token that has decode permission from the image owner.</p>

        <div class="actions">
          <div class="actions-left">
            <button id="signInBtn">Sign In</button>
            <button id="saveBtn">Save Settings</button>
          </div>
          <span id="status"></span>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
  </html>
